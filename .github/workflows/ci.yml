name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  linux-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ pkg-config \
            qt6-base-dev libqt6test6 \
            libudev-dev libssl-dev \
            libnotify-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DFLASHSPARTAN_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Validate ISO manifest
        run: python3 tools/validate-iso-manifest.py

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure
          echo "Tests completed: $(ctest --test-dir build -N | grep -c 'Test #')"

  windows-build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize Git line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git add --renormalize resources/iso-catalog tests/fixtures
          git checkout -- resources/iso-catalog tests/fixtures

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup OpenSSL
        shell: pwsh
        run: ./packaging/windows/scripts/ensure-ci-openssl.ps1

      - name: Setup GnuPG for tests
        shell: pwsh
        run: ./packaging/windows/scripts/ensure-ci-gpg.ps1

      - name: Validate ISO manifest
        shell: pwsh
        run: python tools/validate-iso-manifest.py

      - name: Verify toolchain helpers
        shell: pwsh
        run: windeployqt --version

      - name: Configure
        shell: pwsh
        run: |
          if (-not $env:OPENSSL_ROOT_DIR) {
            throw "OPENSSL_ROOT_DIR is not set (ensure-ci-openssl.ps1 should have set it)"
          }
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLASHSPARTAN_BUILD_TESTS=ON `
            -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR"

      - name: Verify catalog byte order before build
        shell: pwsh
        run: |
          $paths = @(
            'resources/iso-catalog/embedded-manifest.json',
            'resources/iso-catalog/embedded-manifest.json.sha256'
          )
          foreach ($path in $paths) {
            $bytes = [System.IO.File]::ReadAllBytes($path)
            if ($bytes -contains 13) {
              throw "CRLF byte found in $path — manifest must be LF-only before RCC"
            }
          }

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: pwsh
        run: |
          foreach ($bin in @('C:\Program Files\Git\usr\bin', 'C:\Program Files\Git\mingw64\bin')) {
            if (Test-Path $bin) { $env:PATH = "$bin;$env:PATH" }
          }
          $env:FLASHSPARTAN_SOURCE_ROOT = "${{ github.workspace }}"
          ctest --test-dir build -C Release --output-on-failure
          if ($LASTEXITCODE -ne 0) {
            $tests = @(
              'build\tests\Release\test_iso_catalog.exe',
              'build\tests\Release\test_iso_verify_publisher_mock.exe'
            )
            foreach ($exe in $tests) {
              if (Test-Path $exe) { & $exe -v2 }
            }
            exit $LASTEXITCODE
          }

      - name: Package portable ZIP
        shell: pwsh
        run: |
          cmake --install build --config Release --prefix "$pwd/stage"
          $exe = Get-ChildItem -Path "$pwd/stage" -Filter FlashSpartan.exe -Recurse | Select-Object -First 1
          if (-not $exe) {
            throw "FlashSpartan.exe was not installed into the staging directory"
          }
          windeployqt --release --compiler-runtime --no-translations "$($exe.FullName)"
          $opensslBins = @(
            "C:/Program Files/OpenSSL/bin",
            "C:/Program Files/OpenSSL-Win64/bin"
          )
          foreach ($bin in $opensslBins) {
            if (Test-Path $bin) {
              Get-ChildItem $bin -Filter "libcrypto*.dll" | Copy-Item -Destination $exe.DirectoryName -Force
              Get-ChildItem $bin -Filter "libssl*.dll" | Copy-Item -Destination $exe.DirectoryName -Force
            }
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path stage/* -DestinationPath artifacts/FlashSpartan-windows-portable.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashSpartan-windows-portable
          path: artifacts/FlashSpartan-windows-portable.zip

  windows-installers:
    runs-on: windows-latest
    needs: windows-build-and-test
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Normalize Git line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git add --renormalize resources/iso-catalog tests/fixtures
          git checkout -- resources/iso-catalog tests/fixtures

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Install OpenSSL and WiX
        shell: pwsh
        run: |
          choco install openssl wixtoolset -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: Build MSI and setup EXE
        shell: pwsh
        run: |
          $opensslRoot = "C:/Program Files/OpenSSL"
          if (-not (Test-Path $opensslRoot)) {
            $opensslRoot = "C:/Program Files/OpenSSL-Win64"
          }
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLASHSPARTAN_BUILD_TESTS=OFF `
            -DFLASHSPARTAN_BUILD_WINDOWS_INSTALLERS=ON `
            -DOPENSSL_ROOT_DIR="$opensslRoot" `
            "${{ github.workspace }}"
          cmake --build build --config Release --parallel
          cmake --build build --config Release --target flashspartan-windows-installers
          New-Item -ItemType Directory -Force -Path artifacts/installers | Out-Null
          $msi = Get-ChildItem build/wix-out -Filter *.msi -ErrorAction SilentlyContinue
          $setup = Get-ChildItem build/wix-out -Filter *-setup.exe -ErrorAction SilentlyContinue
          if (-not $msi) { throw "MSI was not produced under build/wix-out" }
          if (-not $setup) { throw "setup.exe was not produced under build/wix-out" }
          Copy-Item build/wix-out/*.msi artifacts/installers/
          Copy-Item build/wix-out/*-setup.exe artifacts/installers/

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: FlashSpartan-windows-installers
          path: artifacts/installers/
