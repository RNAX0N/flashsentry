name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ pkg-config \
            qt6-base-dev libqt6test6 \
            libudev-dev libssl-dev \
            libnotify-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DFLASHSENTRY_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Validate ISO manifest
        run: python3 tools/validate-iso-manifest.py

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure
          echo "Tests completed: $(ctest --test-dir build -N | grep -c 'Test #')"
